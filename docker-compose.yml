version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: guardrail-db
    environment:
      POSTGRES_USER: guardrail_user
      POSTGRES_PASSWORD: guardrail_password
      POSTGRES_DB: guardrail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardrail_user -d guardrail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardrail-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://guardrail_user:guardrail_password@db:5432/guardrail_db
      - SECRET_KEY=guardrail_super_secret_signing_key_change_me_in_production_13579
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guardrail-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
