apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  labels:
    app: billing
spec:
  replicas: 3
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      containers:
        - name: web-app
          image: node:18-alpine
          ports:
            - containerPort: 3000
          # VIOLATION: Missing resources limits for CPU and Memory
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
          securityContext:
            # VIOLATION: Container allows execution as root (runAsNonRoot is missing / runAsUser not configured)
            readOnlyRootFilesystem: true
            
        - name: admin-agent
          image: admin-tool:latest
          # VIOLATION: Container is running with privileged escalations enabled
          # VIOLATION: Container is explicitly running as Root user (UID 0)
          securityContext:
            privileged: true
            runAsUser: 0
